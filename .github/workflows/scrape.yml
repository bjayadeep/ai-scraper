name: Daily Cyber Security Job Scraper

on:
  schedule:
    # Run daily at 11:30 PM UTC = 5:00 AM IST next day
    - cron: '30 23 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium --with-deps

    - name: Run Job Aggregator
      env:
        SMTP_HOST: smtp.gmail.com
        SMTP_PORT: "587"
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        USE_AI_FILTER: "true"
      run: |
        python main.py

    - name: Commit & Push Excel History
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/history/
        if git diff-index --quiet HEAD --; then
          echo "No new Excel reports generated today. Skipping commit."
        else
          git commit -m "chore: daily cyber jobs report $(date +'%d-%m-%Y') [skip ci]"
          git push origin main
        fi
